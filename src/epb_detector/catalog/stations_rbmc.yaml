# RBMC (Rede Brasileira de Monitoramento Contínuo) stations used by the EPB detector.
#
# ECEF positions are sourced from IBGE RBMC station descriptions and SIRGAS-CON
# log files; values in meters (WGS84). Geodetic lat/lon are derived. Magnetic
# (QD) latitudes are computed at runtime via aacgmv2 for the year of interest.
#
# Status field:
#   - "active": currently operating
#   - "decommissioned": no longer providing data, but historical files remain
#
# region groups stations by ionospheric regime:
#   - "magnetic-equator": |QD-lat| < 5°
#   - "eia-crest-south":  -20° <= QD-lat <= -5°
#   - "mid-latitude":     QD-lat <= -20°
#
# The MVP uses the three stations marked mvp: true.

stations:
