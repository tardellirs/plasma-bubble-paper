# Curated EPB case-study events from the published literature.
#
# Each entry records a (station, day) where authors confirmed an equatorial
# plasma bubble through GNSS scintillation, ROTI, ionossondas, or airglow
# observations. Used as an independent label source ("literature-v1") for
# robustness evaluation.
#
# Fields:
#   stations: 4-letter codes that observed the event
#   reference: short-form citation
#   doi: DOI of the publication
#   notes: optional context (storm conditions, instrument)
#
# Add new entries via:  epb labels external add ...
#
# IMPORTANT: this list is sparse on purpose. The goal is to populate it with
# events whose ground truth is independent of our heuristic — i.e. confirmed
# by a different instrument or methodology than the one we use. Quality over
# quantity.

events:
  - date: 2015-12-25
    stations: [SALU, BOAV, BELE]
    reference: "Picanço et al., 2022, J. Atmos. Sol.-Terr. Phys., 232"
    doi: "10.1016/j.jastp.2022.105873"
    notes: "Strong post-sunset EPBs over the Brazilian sector during a quiet day."

  - date: 2014-10-08
    stations: [SALU, BRAZ, BOAV]
    reference: "Muella et al., 2017, Adv. Space Res., 60"
    doi: "10.1016/j.asr.2017.05.025"
    notes: "Solar maximum, multi-station scintillation event."

  - date: 2017-09-08
