# EPB detector — local / VPS deployment.
#
# Three services share a single named volume so all processes see the same
# manifest, parquets, and pyOASIS outputs in real time.
#
# - `api` exposes FastAPI on host port 8000 (bound to 127.0.0.1 — never
#   public; the web app reaches it over the internal docker network).
# - `web` runs the Next.js frontend, picked up by Traefik via labels and
#   served at the configured `WEB_HOST` (default: plasma-bubble.ifsp.dev).
# - `ingest` runs `epb ingest phase2a` once and exits. Restart with
#   `docker compose run --rm ingest` to continue (it skips already-done jobs).
#
# IMPORTANT: nothing here references a specific host or IP that wouldn't
# round-trip via env vars. Use `compose.override.yml` for host-specific
# tweaks (gitignored).

name: epb

services:
  api:
    image: epb-detector:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: epb-api
    restart: unless-stopped
    command: ["uvicorn", "services.api.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - epb_data:/data
    environment:
      EPB_INGEST_WORKERS: "1"

  web:
    image: epb-web:latest
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: epb-web
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      # Bind to all interfaces — the container is attached to two docker
      # networks (epb_default for the API, dokploy-network for Traefik) and
      # must accept connections on both. Next standalone defaults to
      # `localhost` on some builds, which 502s under Traefik.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Server-side proxy target (also used by /api rewrites in Next).
      API_INTERNAL_URL: "http://epb-api:8000"
      # Client-side fetches go through the rewrites → no public 8000 leak.
      NEXT_PUBLIC_API_URL: "/api"
    networks:
      default:
      dokploy-network:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.epb-web.rule=Host(`${WEB_HOST:-plasma-bubble.ifsp.dev}`)"
      - "traefik.http.routers.epb-web.entrypoints=websecure"
      - "traefik.http.routers.epb-web.tls=true"
      - "traefik.http.routers.epb-web.tls.certresolver=le"
      - "traefik.http.services.epb-web.loadbalancer.server.port=3000"

  ingest:
    image: epb-detector:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: epb-ingest
    # Don't restart on OOM/crash — bulk ingest must be deterministic. If
    # one job blows up, the manifest already records the failure and the
    # next run skips it. Infinite restart loops mask real OOMs.
    restart: "no"
    profiles: ["work"]
    command: ["python", "-m", "epb_detector.cli", "ingest", "phase2a"]
    volumes:
      - epb_data:/data
    environment:
      # Each pyOASIS worker peaks around 2.0-2.5 GiB; 3 workers fits the
      # 15 GiB VPS with margin. Bump only when the container has headroom.
      EPB_INGEST_WORKERS: "3"
      MPLBACKEND: "Agg"
    mem_limit: 9g
    memswap_limit: 9g
    deploy:
      resources:
        limits:
          memory: 9G

networks:
  default:
    name: epb_default
  dokploy-network:
    external: true
    name: dokploy-network

volumes:
  epb_data:
    name: epb_data
